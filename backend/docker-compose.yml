version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: emprestazap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-p2plending}
      POSTGRES_USER: ${POSTGRES_USER:-p2puser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-p2ppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-p2puser} -d ${POSTGRES_DB:-p2plending}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API + Indexer ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emprestazap_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
